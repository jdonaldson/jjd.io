<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STARLINGS — 3D murmuration on a wasm engine</title>
<style>
  :root {
    --ground:   #0b1418;
    --panel:    rgba(15, 29, 35, 0.72);
    --ink:      #dbe7ea;
    --ink-dim:  #829aa1;
    --line:     rgba(219, 231, 234, 0.10);
    --accent:   #f0a24a;
    --accent-2: #ffce8a;
    --sky-top:  #101c2e;
    --sky-mid:  #24344a;
    --sky-low:  #8a5a38;
    --bird:     #060a0e;
    --shadow: 0 18px 50px -18px rgba(0,0,0,0.7);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ground:#e9e4d8; --panel:rgba(245,241,232,0.82); --ink:#1a2226; --ink-dim:#5a6a6f;
      --line:rgba(26,34,38,0.12); --accent:#bc5f14; --accent-2:#d8892f;
      --sky-top:#b9cfdd; --sky-mid:#dfd9c6; --sky-low:#e8b98a; --bird:#141a1e;
      --shadow:0 18px 40px -20px rgba(40,50,50,0.35);
    }
  }
  :root[data-theme="light"] {
    --ground:#e9e4d8; --panel:rgba(245,241,232,0.82); --ink:#1a2226; --ink-dim:#5a6a6f;
    --line:rgba(26,34,38,0.12); --accent:#bc5f14; --accent-2:#d8892f;
    --sky-top:#b9cfdd; --sky-mid:#dfd9c6; --sky-low:#e8b98a; --bird:#141a1e;
    --shadow:0 18px 40px -20px rgba(40,50,50,0.35);
  }
  :root[data-theme="dark"] {
    --ground:#0b1418; --panel:rgba(15,29,35,0.72); --ink:#dbe7ea; --ink-dim:#829aa1;
    --line:rgba(219,231,234,0.10); --accent:#f0a24a; --accent-2:#ffce8a;
    --sky-top:#101c2e; --sky-mid:#24344a; --sky-low:#8a5a38; --bird:#060a0e;
    --shadow:0 18px 50px -18px rgba(0,0,0,0.7);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--ground); color: var(--ink);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  #sim { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; }
  #sim.dragging { cursor: grabbing; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: flex-start;
    justify-content: space-between; padding: 18px 22px; pointer-events: none; gap: 16px;
  }
  #brand h1 {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-weight: 800;
    font-size: 20px; letter-spacing: -0.02em; margin: 0; line-height: 1; color: var(--ink);
  }
  #brand h1 .fire { color: var(--accent); }
  #brand p { margin: 6px 0 0; max-width: 36ch; font-size: 11px; line-height: 1.45; color: var(--ink-dim); }
  #readout {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); box-shadow: var(--shadow);
  }
  #readout .big { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1; }
  .mono-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); }

  #console {
    position: fixed; left: 22px; bottom: 22px; width: 300px; max-width: calc(100vw - 44px);
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 16px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: var(--shadow);
  }
  .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .row .num { color: var(--accent); font-variant-numeric: tabular-nums; font-size: 12px; }
  .row .name { font-size: 11px; color: var(--ink-dim); }
  input[type="range"] { width: 100%; accent-color: var(--accent); margin: 0 0 12px; }
  .btns { display: flex; gap: 8px; }
  .btns button {
    flex: 1; font: inherit; font-size: 11px; letter-spacing: 0.06em; padding: 8px 0;
    border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--ink);
    cursor: pointer;
  }
  .btns button[aria-pressed="true"] { border-color: var(--accent); color: var(--accent); }
  .btns button:hover { border-color: var(--accent-2); }
  #hint { margin-top: 10px; font-size: 10px; color: var(--ink-dim); line-height: 1.5; }

  /* lite preview mode (?lite) — sim only, name centered, no UI */
  .lite #topbar, .lite #console { display: none !important; }
  #liteTitle {
    position: fixed; inset: 0; display: flex; flex-direction: column; gap: 10px;
    align-items: center; justify-content: center; pointer-events: none; text-align: center;
  }
  #liteTitle h1 {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-weight: 800;
    font-size: clamp(28px, 9vw, 54px); letter-spacing: -0.02em; margin: 0; color: var(--ink);
    text-shadow: 0 2px 18px rgba(0,0,0,0.35);
  }
  #liteTitle h1 span { color: var(--accent); }
  #liteTitle p {
    margin: 0; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-dim);
  }
</style>
</head>
<body>
<canvas id="sim"></canvas>

<div id="topbar">
  <div id="brand">
    <h1>STARLINGS<span class="fire"> ✦</span></h1>
    <p>Seven-neighbor topological flocking in 3D — a Rust simulation compiled to WebAssembly, drawn as the birds you'd actually see at dusk.</p>
  </div>
  <div id="readout">
    <span class="mono-label">birds</span>
    <span class="big" id="nBirds">—</span>
    <span class="mono-label" id="fps">— fps</span>
  </div>
</div>

<div id="console">
  <div class="row"><span class="name">Flock size</span><span class="num" id="countNum">500</span></div>
  <input id="count" type="range" min="100" max="1500" step="50" value="500" aria-label="Flock size">
  <div class="btns">
    <button id="pred" aria-pressed="true">🦅 Falcon</button>
    <button id="pause" aria-pressed="false">⏸ Pause</button>
    <button id="reset">↻ Reset</button>
  </div>
  <div id="hint">drag to orbit · scroll to zoom · the falcon is why the flock folds</div>
</div>

// ---------- boot the engine (wasm inlined above; glue pasted verbatim) ----------
const bytes = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
initSync({ module: bytes });

// lite preview mode (?lite): a fraction of the flock, no UI, name centered
const LITE = new URLSearchParams(location.search).has("lite");
if (LITE) {
  document.documentElement.classList.add("lite");
  const t = document.createElement("div");
  t.id = "liteTitle";
  t.innerHTML = '<h1>STARLINGS<span> ✦</span></h1><p>3d murmuration · rust → wasm</p>';
  document.body.appendChild(t);
}

let N = LITE ? 150 : 500;
let sim = new BoidsWasm(N);
let prev = null;                       // previous positions for velocity/heading
let phase = null;                      // per-bird wingbeat phase
function seedAux() {
  prev = null;
  phase = new Float32Array(N);
  for (let i = 0; i < N; i++) phase[i] = (i * 2.399963) % (Math.PI * 2); // golden-angle spread
}
seedAux();

// ---------- canvas / theme ----------
const cv = document.getElementById("sim");
const ctx = cv.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
const css = () => getComputedStyle(document.documentElement);
let TH = {};
function readTheme() {
  const s = css();
  TH = {
    skyTop: s.getPropertyValue("--sky-top").trim(),
    skyMid: s.getPropertyValue("--sky-mid").trim(),
    skyLow: s.getPropertyValue("--sky-low").trim(),
    bird:   s.getPropertyValue("--bird").trim(),
    accent: s.getPropertyValue("--accent").trim(),
  };
}
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", readTheme);
new MutationObserver(readTheme).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

// ---------- camera ----------
const target = { x: 0, y: 25, z: 0 };
let az = 0.6, el = 0.12, R = 300;
let autoRot = true;
cv.addEventListener("pointerdown", e => {
  cv.classList.add("dragging"); cv.setPointerCapture(e.pointerId);
  autoRot = false;
  let lx = e.clientX, ly = e.clientY;
  const move = ev => {
    az += (ev.clientX - lx) * 0.005;
    el = Math.max(-0.5, Math.min(1.25, el + (ev.clientY - ly) * 0.004));
    lx = ev.clientX; ly = ev.clientY;
  };
  const up = () => {
    cv.classList.remove("dragging");
    cv.removeEventListener("pointermove", move); cv.removeEventListener("pointerup", up);
    setTimeout(() => { autoRot = true; }, 4000);   // resume the slow orbit after the user lets go
  };
  cv.addEventListener("pointermove", move); cv.addEventListener("pointerup", up);
});
cv.addEventListener("wheel", e => {
  e.preventDefault();
  R = Math.max(120, Math.min(650, R * (1 + e.deltaY * 0.001)));
}, { passive: false });

// ---------- projection ----------
let cam = {}, basis = {};
function updateCamera() {
  const ce = Math.cos(el), se = Math.sin(el);
  cam = { x: target.x + R * ce * Math.cos(az), y: target.y + R * se, z: target.z + R * ce * Math.sin(az) };
  let fx = target.x - cam.x, fy = target.y - cam.y, fz = target.z - cam.z;
  const fl = Math.hypot(fx, fy, fz); fx /= fl; fy /= fl; fz /= fl;
  // right = forward × worldUp
  let rx = fz, ry = 0, rz = -fx;
  const rl = Math.hypot(rx, ry, rz) || 1; rx /= rl; rz /= rl;
  // up = right × forward
  const ux = ry * fz - rz * fy, uy = rz * fx - rx * fz, uz = rx * fy - ry * fx;
  basis = { fx, fy, fz, rx, ry, rz, ux, uy, uz };
}
const NEAR = 4;
function project(x, y, z, out) {
  const dx = x - cam.x, dy = y - cam.y, dz = z - cam.z;
  const zc = dx * basis.fx + dy * basis.fy + dz * basis.fz;
  if (zc < NEAR) return false;
  const f = H * 1.1;
  out.x = W / 2 + f * (dx * basis.rx + dy * basis.ry + dz * basis.rz) / zc;
  out.y = H / 2 - f * (dx * basis.ux + dy * basis.uy + dz * basis.uz) / zc;
  out.s = f / zc;
  out.z = zc;
  return true;
}

// ---------- drawing ----------
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, TH.skyTop); g.addColorStop(0.62, TH.skyMid); g.addColorStop(1, TH.skyLow);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}
function drawBird(x, y, s, ang, ph, depthT, big) {
  // s: world→screen scale; wingspan ~2.4 world units, falcon larger
  const ws = Math.min(26, Math.max(0.8, s * (big ? 2.6 : 1.2)));
  const flap = big ? Math.sin(ph) * 0.35 : Math.sin(ph) * 0.85;
  ctx.save();
  ctx.translate(x, y); ctx.rotate(ang);
  ctx.globalAlpha = Math.max(0.25, Math.min(1, depthT));
  ctx.strokeStyle = big ? TH.accent : TH.bird;
  ctx.lineWidth = Math.max(0.7, ws * 0.22);
  ctx.lineCap = "round";
  ctx.beginPath();
  // wings perpendicular to heading (heading is +x after rotate)
  ctx.moveTo(-ws * 0.15, -ws);
  ctx.quadraticCurveTo(ws * 0.28 * flap, -ws * 0.4, 0, 0);
  ctx.quadraticCurveTo(ws * 0.28 * flap, ws * 0.4, -ws * 0.15, ws);
  ctx.stroke();
  // body
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.ellipse(0, 0, ws * 0.42, ws * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ---------- controls ----------
const el$ = id => document.getElementById(id);
el$("count").addEventListener("input", e => {
  N = +e.target.value; el$("countNum").textContent = N;
  const wasPred = sim.predator_active();
  sim.free(); sim = new BoidsWasm(N); sim.set_predator_active(wasPred);
  if (paused) sim.set_paused(true);
  seedAux();
});
el$("pred").addEventListener("click", e => {
  const on = !sim.predator_active();
  sim.set_predator_active(on); e.target.setAttribute("aria-pressed", on);
});
let paused = false;
el$("pause").addEventListener("click", e => {
  paused = !paused; sim.set_paused(paused); e.target.setAttribute("aria-pressed", paused);
});
el$("reset").addEventListener("click", () => { sim.reset(); prev = null; });

// ---------- main loop ----------
const P = { x: 0, y: 0, s: 0, z: 0 };
const order = { idx: null, depth: null };
let frames = 0, fpsT = performance.now(), t = 0;
function loop(now) {
  requestAnimationFrame(loop);
  if (autoRot && !paused) az += 0.0012;
  t += 1 / 60;

  const pos = sim.step();                       // Float32Array view, N*3 — consume, don't retain
  if (!prev || prev.length !== pos.length) prev = new Float32Array(pos);

  updateCamera(); drawSky();

  // depth sort (far → near) so nearer birds draw on top
  if (!order.idx || order.idx.length !== N) { order.idx = new Uint16Array(N); order.depth = new Float32Array(N); }
  let visible = 0;
  for (let i = 0; i < N; i++) {
    const dx = pos[3*i] - cam.x, dy = pos[3*i+1] - cam.y, dz = pos[3*i+2] - cam.z;
    order.depth[i] = dx * basis.fx + dy * basis.fy + dz * basis.fz;
    order.idx[visible++] = i;
  }
  const idx = Array.prototype.slice.call(order.idx, 0, visible)
    .sort((a, b) => order.depth[b] - order.depth[a]);

  for (const i of idx) {
    const x = pos[3*i], y = pos[3*i+1], z = pos[3*i+2];
    if (!project(x, y, z, P)) continue;
    // heading from frame-to-frame displacement, in camera space
    const vx = x - prev[3*i], vy = y - prev[3*i+1], vz = z - prev[3*i+2];
    const hx = vx * basis.rx + vy * basis.ry + vz * basis.rz;
    const hy = vx * basis.ux + vy * basis.uy + vz * basis.uz;
    const ang = Math.atan2(-hy, hx);
    const speed = Math.hypot(vx, vy, vz);
    if (!paused) phase[i] += 0.25 + speed * 2.2;      // faster birds beat faster
    const depthT = 1.6 - order.depth[i] / (R * 1.6);
    drawBird(P.x, P.y, P.s, ang, phase[i], depthT, false);
  }
  prev.set(pos);

  // predator on top
  if (sim.predator_active()) {
    const pp = sim.predator_pos();
    if (project(pp[0], pp[1], pp[2], P)) {
      const o = sim.predator_orient();            // [pitch, yaw, 0] degrees
      const yaw = o[1] * Math.PI / 180, pitch = o[0] * Math.PI / 180;
      const vx = Math.cos(pitch) * Math.cos(yaw), vy = Math.sin(pitch), vz = Math.cos(pitch) * Math.sin(yaw);
      const hx = vx * basis.rx + vy * basis.ry + vz * basis.rz;
      const hy = vx * basis.ux + vy * basis.uy + vz * basis.uz;
      drawBird(P.x, P.y, P.s, Math.atan2(-hy, hx), t * 7, 1, true);
    }
  }

  frames++;
  if (now - fpsT > 800) {
    el$("fps").textContent = Math.round(frames * 1000 / (now - fpsT)) + " fps";
    el$("nBirds").textContent = N;
    frames = 0; fpsT = now;
  }
}

window.addEventListener("resize", resize);
readTheme(); resize();
requestAnimationFrame(loop);
</script>
